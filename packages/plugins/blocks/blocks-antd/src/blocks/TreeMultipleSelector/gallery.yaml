- title: Basic (flat data, tags)
  blocks:
    - id: basic_tree_multiple
      type: TreeMultipleSelector
      properties:
        title: Categories
        primaryKey: id
        parentKey: parentId
        valueKey: id
        html: '{{ item.label }}'
        treeDefaultExpandAll: true
        data:
          - { id: 1, label: Electronics }
          - { id: 2, label: Phones, parentId: 1 }
          - { id: 3, label: Laptops, parentId: 1 }
          - { id: 4, label: Clothing }
          - { id: 5, label: Shirts, parentId: 4 }
          - { id: 6, label: Shoes, parentId: 4 }

- title: Checkable
  blocks:
    - id: checkable_tree_multiple
      type: TreeMultipleSelector
      properties:
        title: Permissions
        checkable: true
        showCheckedStrategy: SHOW_CHILD
        primaryKey: id
        parentKey: parentId
        valueKey: id
        html: '{{ item.label }}'
        treeDefaultExpandAll: true
        data:
          - { id: 1, label: Read }
          - { id: 2, label: Write }
          - { id: 3, label: Create, parentId: 2 }
          - { id: 4, label: Update, parentId: 2 }
          - { id: 5, label: Admin }
      events:
        onChange:
          - id: capture
            type: SetState
            params:
              perms:
                _event: value
    - id: checkable_tree_display
      type: Paragraph
      properties:
        content:
          _nunjucks:
            template: 'Selected: {{ perms }}'
            on:
              _state: true
