- title: Basic PageSidebarLayout
  fullWidth: true
  blocks:
    - id: psl_basic
      type: PageSidebarLayout
      properties:
        siderStorageKey: psl_basic
        sider:
          initialCollapsed: false
          width: 220
        menu:
          links:
            - id: psl_basic_dash
              type: MenuLink
              properties:
                title: Dashboard
                icon: AiOutlineDashboard
            - id: psl_basic_users
              type: MenuLink
              properties:
                title: Users
                icon: AiOutlineUser
            - id: psl_basic_settings
              type: MenuLink
              properties:
                title: Settings
                icon: AiOutlineSetting
      blocks:
        - id: psl_basic_content
          type: Paragraph
          properties:
            content: PageSidebarLayout provides a full-page layout with a full-height sidebar. The sider spans the entire viewport height with the logo at the bottom. On mobile screens, a hamburger menu with a full-width drawer replaces the sider.

- title: Dark Color Scheme
  fullWidth: true
  blocks:
    - id: psl_dark
      type: PageSidebarLayout
      properties:
        siderStorageKey: psl_dark
        theme: dark
        sider:
          initialCollapsed: false
          width: 220
        menu:
          links:
            - id: psl_dark_dash
              type: MenuLink
              properties:
                title: Dashboard
                icon: AiOutlineDashboard
            - id: psl_dark_analytics
              type: MenuLink
              properties:
                title: Analytics
                icon: AiOutlineBarChart
            - id: psl_dark_settings
              type: MenuLink
              properties:
                title: Settings
                icon: AiOutlineSetting
      blocks:
        - id: psl_dark_content
          type: Paragraph
          properties:
            content: Setting theme to dark applies the dark theme to all components — sider, menu, headers, mobile drawer, toggle button, and logo background all adjust automatically.

- title: Light Color Scheme
  fullWidth: true
  blocks:
    - id: psl_light
      type: PageSidebarLayout
      properties:
        siderStorageKey: psl_light
        theme: light
        menu:
          links:
            - id: psl_light_home
              type: MenuLink
              properties:
                title: Home
                icon: AiOutlineHome
            - id: psl_light_docs
              type: MenuLink
              properties:
                title: Documentation
                icon: AiOutlineBook
      blocks:
        - id: psl_light_content
          type: Paragraph
          properties:
            content: Explicit light theme. Light is the default when theme is not specified.

- title: Dark Sider with Light Header
  fullWidth: true
  blocks:
    - id: psl_mixed
      type: PageSidebarLayout
      properties:
        siderStorageKey: psl_mixed
        theme: dark
        header:
          theme: light
        sider:
          width: 220
        menu:
          links:
            - id: psl_mixed_dash
              type: MenuLink
              properties:
                title: Dashboard
                icon: AiOutlineDashboard
            - id: psl_mixed_users
              type: MenuLink
              properties:
                title: Users
                icon: AiOutlineUser
      slots:
        header:
          blocks:
            - id: psl_mixed_header_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Action
                color: primary
                variant: solid
                size: small
      blocks:
        - id: psl_mixed_content
          type: Paragraph
          properties:
            content: theme sets the base to dark, but header.theme overrides it to light. Individual component themes always take precedence over the base theme.

- title: Menu with Nested Groups
  fullWidth: true
  blocks:
    - id: psl_nested
      type: PageSidebarLayout
      properties:
        siderStorageKey: psl_nested
        theme: dark
        sider:
          width: 240
        menu:
          defaultOpenKeys:
            - psl_nested_admin
          links:
            - id: psl_nested_dash
              type: MenuLink
              properties:
                title: Dashboard
                icon: AiOutlineDashboard
            - id: psl_nested_admin
              type: MenuGroup
              properties:
                title: Administration
                icon: AiOutlineTeam
              links:
                - id: psl_nested_users
                  type: MenuLink
                  properties:
                    title: Users
                - id: psl_nested_roles
                  type: MenuLink
                  properties:
                    title: Roles & Permissions
            - id: psl_nested_content_group
              type: MenuGroup
              properties:
                title: Content
                icon: AiOutlineEdit
              links:
                - id: psl_nested_articles
                  type: MenuLink
                  properties:
                    title: Articles
                - id: psl_nested_categories
                  type: MenuLink
                  properties:
                    title: Categories
      blocks:
        - id: psl_nested_content
          type: Paragraph
          properties:
            content: Menu with nested groups and defaultOpenKeys to expand the Administration section on load.

- title: Initially Collapsed
  fullWidth: true
  blocks:
    - id: psl_collapsed
      type: PageSidebarLayout
      properties:
        siderStorageKey: psl_collapsed
        sider:
          initialCollapsed: true
        menu:
          links:
            - id: psl_collapsed_dash
              type: MenuLink
              properties:
                title: Dashboard
                icon: AiOutlineDashboard
            - id: psl_collapsed_users
              type: MenuLink
              properties:
                title: Users
                icon: AiOutlineUser
      blocks:
        - id: psl_collapsed_content
          type: Paragraph
          properties:
            content: Sider starts collapsed. Click the toggle button to expand. The collapsed state is persisted in localStorage.

- title: With Breadcrumb
  fullWidth: true
  blocks:
    - id: psl_breadcrumb
      type: PageSidebarLayout
      properties:
        siderStorageKey: psl_breadcrumb
        breadcrumb:
          separator: /
          list:
            - Admin
            - Dashboard
            - Overview
        menu:
          links:
            - id: psl_bc_dash
              type: MenuLink
              properties:
                title: Dashboard
                icon: AiOutlineDashboard
      blocks:
        - id: psl_bc_content
          type: Paragraph
          properties:
            content: Breadcrumb navigation appears above the content area.

- title: With Desktop Header
  fullWidth: true
  blocks:
    - id: psl_header
      type: PageSidebarLayout
      properties:
        siderStorageKey: psl_header
        theme: dark
        sider:
          width: 220
        header:
          contentStyle:
            justifyContent: flex-end
        menu:
          links:
            - id: psl_header_dash
              type: MenuLink
              properties:
                title: Dashboard
                icon: AiOutlineDashboard
            - id: psl_header_settings
              type: MenuLink
              properties:
                title: Settings
                icon: AiOutlineSetting
      slots:
        header:
          blocks:
            - id: psl_header_row
              type: Box
              layout:
                gap: 12
                align: center
              blocks:
                - id: psl_header_notif_btn
                  type: Button
                  layout:
                    flex: 0 0 auto
                  properties:
                    icon: AiOutlineBell
                    hideTitle: true
                    color: default
                    variant: text
                    size: small
                - id: psl_header_avatar
                  type: Avatar
                  layout:
                    flex: 0 0 auto
                  properties:
                    icon: AiOutlineUser
                    size: small
                    color: '#fff'
                    backgroundColor: '#1677ff'
      blocks:
        - id: psl_header_content
          type: Paragraph
          properties:
            content: Optional desktop header with action buttons. The header sits inside the content area, not above the sider. The dark theme applies to the header automatically.

- title: With Footer
  fullWidth: true
  blocks:
    - id: psl_footer
      type: PageSidebarLayout
      properties:
        siderStorageKey: psl_footer
        footer:
          style:
            textAlign: center
        menu:
          links:
            - id: psl_footer_dash
              type: MenuLink
              properties:
                title: Dashboard
                icon: AiOutlineDashboard
      slots:
        footer:
          blocks:
            - id: psl_footer_text
              type: Paragraph
              properties:
                content: My App v1.0.0 - Powered by Lowdefy
                style:
                  textAlign: center
                  margin: 0
                  color: '#999'
                  fontSize: 12
      blocks:
        - id: psl_footer_content
          type: Paragraph
          properties:
            content: Footer appears below the content area inside the main layout.

- title: Custom Sider Width
  fullWidth: true
  blocks:
    - id: psl_width
      type: PageSidebarLayout
      properties:
        siderStorageKey: psl_width
        theme: dark
        sider:
          width: 300
        menu:
          links:
            - id: psl_width_dash
              type: MenuLink
              properties:
                title: Dashboard
                icon: AiOutlineDashboard
      blocks:
        - id: psl_width_content
          type: Paragraph
          properties:
            content: Sider width set to 300px.

- title: Custom Collapsed Width
  fullWidth: true
  blocks:
    - id: psl_cw
      type: PageSidebarLayout
      properties:
        siderStorageKey: psl_cw
        sider:
          initialCollapsed: true
          collapsedWidth: 0
        menu:
          links:
            - id: psl_cw_dash
              type: MenuLink
              properties:
                title: Dashboard
                icon: AiOutlineDashboard
      blocks:
        - id: psl_cw_content
          type: Paragraph
          properties:
            content: Collapsed width set to 0. The sider disappears completely when collapsed.

- title: Hidden Toggle Button
  fullWidth: true
  blocks:
    - id: psl_no_toggle
      type: PageSidebarLayout
      properties:
        siderStorageKey: psl_no_toggle
        sider:
          hideToggleButton: true
        menu:
          links:
            - id: psl_nt_dash
              type: MenuLink
              properties:
                title: Dashboard
                icon: AiOutlineDashboard
      blocks:
        - id: psl_nt_content
          type: Paragraph
          properties:
            content: Toggle button is hidden. Use the toggleSiderOpen or setSiderOpen methods to control the sider programmatically.

- title: Logo Configuration
  fullWidth: true
  blocks:
    - id: psl_logo
      type: PageSidebarLayout
      properties:
        siderStorageKey: psl_logo
        theme: dark
        logo:
          src: /logo.png
          srcMobile: /logo-square.png
          alt: Custom Logo
          style:
            width: 80
        menu:
          links:
            - id: psl_logo_dash
              type: MenuLink
              properties:
                title: Dashboard
                icon: AiOutlineDashboard
      blocks:
        - id: psl_logo_content
          type: Paragraph
          properties:
            content: Custom logo with style overrides. The full logo (src) shows when the sider is expanded, and the square logo (srcMobile) shows when collapsed. The logo also appears in the mobile header.

- title: Sider Open/Closed Slots
  fullWidth: true
  blocks:
    - id: psl_slots
      type: PageSidebarLayout
      properties:
        siderStorageKey: psl_slots
        menu:
          links:
            - id: psl_slots_dash
              type: MenuLink
              properties:
                title: Dashboard
                icon: AiOutlineDashboard
      slots:
        siderOpen:
          blocks:
            - id: psl_slots_open
              type: Box
              style:
                padding: 12px
              blocks:
                - id: psl_slots_open_avatar
                  type: Avatar
                  properties:
                    icon: AiOutlineUser
                    size: 48
                    color: '#fff'
                    backgroundColor: '#1677ff'
                - id: psl_slots_open_name
                  type: Paragraph
                  properties:
                    content: Jane Cooper
                    style:
                      margin: 4px 0 0 0
                      fontSize: 14
        siderClosed:
          blocks:
            - id: psl_slots_closed
              type: Box
              style:
                padding: 8px
                textAlign: center
              blocks:
                - id: psl_slots_closed_avatar
                  type: Avatar
                  properties:
                    icon: AiOutlineUser
                    size: 32
                    color: '#fff'
                    backgroundColor: '#1677ff'
      blocks:
        - id: psl_slots_content
          type: Paragraph
          properties:
            content: Different sider content when expanded vs collapsed. The siderOpen slot shows a full user profile, while siderClosed shows just an avatar.

- title: CSS Key Styling
  fullWidth: true
  blocks:
    - id: psl_css
      type: PageSidebarLayout
      properties:
        siderStorageKey: psl_css
        menu:
          links:
            - id: psl_css_dash
              type: MenuLink
              properties:
                title: Dashboard
                icon: AiOutlineDashboard
      style:
        /content:
          padding: 0 20px 20px 20px
        /breadcrumb:
          margin: 12px 0
      blocks:
        - id: psl_css_content
          type: Paragraph
          properties:
            content: CSS keys allow targeting specific areas of the layout for custom styling.

- title: Ant Design Theme Overrides
  fullWidth: true
  blocks:
    - id: psl_theme
      type: PageSidebarLayout
      properties:
        siderStorageKey: psl_theme
        sider:
          width: 220
        breadcrumb:
          list:
            - Home
            - Dashboard
        menu:
          links:
            - id: psl_theme_dash
              type: MenuLink
              properties:
                title: Dashboard
                icon: AiOutlineDashboard
            - id: psl_theme_users
              type: MenuLink
              properties:
                title: Users
                icon: AiOutlineUser
            - id: psl_theme_settings
              type: MenuLink
              properties:
                title: Settings
                icon: AiOutlineSetting
        theme:
          colorPrimary: '#7c3aed'
          borderRadius: 8
          colorBgContainer: '#faf5ff'
      slots:
        header:
          blocks:
            - id: psl_theme_header_btn
              type: Button
              layout:
                flex: 0 0 auto
              properties:
                title: Action
                color: primary
                variant: solid
                size: small
      blocks:
        - id: psl_theme_content
          type: Paragraph
          properties:
            content: The theme property as an object applies global Ant Design design tokens to all child components — menu, breadcrumb, buttons, and content all inherit the purple primary color, rounded corners, and tinted background. As a string, theme controls the dark/light color scheme instead.

- title: Menu Shortcut Keys
  fullWidth: true
  blocks:
    - id: psl_shortcuts
      type: PageSidebarLayout
      properties:
        siderStorageKey: psl_shortcuts
        menu:
          links:
            - id: psl_sc_dash
              type: MenuLink
              properties:
                title: Dashboard
                icon: AiOutlineDashboard
                shortcut: mod+d
            - id: psl_sc_users
              type: MenuLink
              properties:
                title: Users
                icon: AiOutlineUser
                shortcut: mod+u
            - id: psl_sc_settings
              type: MenuLink
              properties:
                title: Settings
                icon: AiOutlineSetting
                shortcut: mod+comma
      blocks:
        - id: psl_sc_content
          type: Paragraph
          properties:
            content: Menu items with keyboard shortcut badges. Press Cmd/Ctrl+D to activate Dashboard, Cmd/Ctrl+U for Users.

- title: PageSidebarLayout as Admin Dashboard
  fullWidth: true
  blocks:
    - id: psl_admin
      type: PageSidebarLayout
      properties:
        siderStorageKey: psl_admin
        theme: dark
        sider:
          width: 240
        breadcrumb:
          list:
            - Admin
            - Dashboard
        header:
          theme: light
          contentStyle:
            justifyContent: flex-end
        menu:
          defaultOpenKeys:
            - psl_admin_users_group
          links:
            - id: psl_admin_dash
              type: MenuLink
              properties:
                title: Dashboard
                icon: AiOutlineDashboard
            - id: psl_admin_users_group
              type: MenuGroup
              properties:
                title: User Management
                icon: AiOutlineTeam
              links:
                - id: psl_admin_all_users
                  type: MenuLink
                  properties:
                    title: All Users
                - id: psl_admin_user_roles
                  type: MenuLink
                  properties:
                    title: Roles & Permissions
            - id: psl_admin_analytics
              type: MenuLink
              properties:
                title: Analytics
                icon: AiOutlineBarChart
            - id: psl_admin_settings
              type: MenuLink
              properties:
                title: Settings
                icon: AiOutlineSetting
      slots:
        header:
          blocks:
            - id: psl_admin_header_row
              type: Box
              layout:
                gap: 16
                align: center
              blocks:
                - id: psl_admin_notif_btn
                  type: Button
                  layout:
                    flex: 0 0 auto
                  properties:
                    icon: AiOutlineBell
                    hideTitle: true
                    color: default
                    variant: text
                    size: small
                  events:
                    onClick:
                      - id: psl_admin_notif_action
                        type: DisplayMessage
                        params:
                          content: You have 3 new notifications.
                          status: info
                - id: psl_admin_avatar
                  type: Avatar
                  layout:
                    flex: 0 0 auto
                  properties:
                    icon: AiOutlineUser
                    size: small
                    color: '#fff'
                    backgroundColor: '#1677ff'
        siderOpen:
          blocks:
            - id: psl_admin_sider_open
              type: Box
              style:
                padding: 12px
              blocks:
                - id: psl_admin_user_avatar
                  type: Avatar
                  properties:
                    icon: AiOutlineUser
                    size: 48
                    color: '#fff'
                    backgroundColor: '#1677ff'
                - id: psl_admin_user_name
                  type: Paragraph
                  properties:
                    content: Admin User
                    style:
                      margin: 4px 0 0 0
                      fontSize: 14
                      color: '#ffffffd9'
        siderClosed:
          blocks:
            - id: psl_admin_sider_closed
              type: Box
              style:
                padding: 8px
                textAlign: center
              blocks:
                - id: psl_admin_user_avatar_sm
                  type: Avatar
                  properties:
                    icon: AiOutlineUser
                    size: 32
                    color: '#fff'
                    backgroundColor: '#1677ff'
        footer:
          blocks:
            - id: psl_admin_footer_text
              type: Paragraph
              properties:
                content: Admin Panel v2.4.1
                style:
                  textAlign: center
                  margin: 0
                  color: '#999'
                  fontSize: 12
      blocks:
        - id: psl_admin_title
          type: Title
          properties:
            content: Dashboard Overview
            level: 3
        - id: psl_admin_stats_row
          type: Box
          layout:
            gap: 16
          blocks:
            - id: psl_admin_stat_users
              type: Card
              layout:
                flex: 1 1 0
              properties:
                size: small
              blocks:
                - id: psl_admin_stat_users_val
                  type: Statistic
                  properties:
                    title: Total Users
                    value: 2847
                    prefixIcon: AiOutlineUser
            - id: psl_admin_stat_revenue
              type: Card
              layout:
                flex: 1 1 0
              properties:
                size: small
              blocks:
                - id: psl_admin_stat_revenue_val
                  type: Statistic
                  properties:
                    title: Revenue
                    value: 58420
                    prefix: $
            - id: psl_admin_stat_orders
              type: Card
              layout:
                flex: 1 1 0
              properties:
                size: small
              blocks:
                - id: psl_admin_stat_orders_val
                  type: Statistic
                  properties:
                    title: Orders
                    value: 384

- title: PageSidebarLayout as Project Management App
  fullWidth: true
  blocks:
    - id: psl_project
      type: PageSidebarLayout
      properties:
        siderStorageKey: psl_project
        theme: dark
        sider:
          width: 250
        breadcrumb:
          separator: /
          list:
            - Projects
            - Project Alpha
            - Tasks
        content:
          style:
            padding: 0 32px 32px 32px
        menu:
          links:
            - id: psl_proj_overview
              type: MenuLink
              properties:
                title: Overview
                icon: AiOutlineAppstore
            - id: psl_proj_tasks_link
              type: MenuLink
              properties:
                title: Tasks
                icon: AiOutlineCheckSquare
            - id: psl_proj_team_group
              type: MenuGroup
              properties:
                title: Team
                icon: AiOutlineTeam
              links:
                - id: psl_proj_members
                  type: MenuLink
                  properties:
                    title: Members
                - id: psl_proj_activity
                  type: MenuLink
                  properties:
                    title: Activity Log
            - id: psl_proj_files
              type: MenuLink
              properties:
                title: Files
                icon: AiOutlineFile
            - id: psl_proj_settings_link
              type: MenuLink
              properties:
                title: Project Settings
                icon: AiOutlineSetting
      slots:
        header:
          blocks:
            - id: psl_proj_header_row
              type: Box
              layout:
                gap: 12
                align: center
              blocks:
                - id: psl_proj_search_btn
                  type: Button
                  layout:
                    flex: 0 0 auto
                  properties:
                    icon: AiOutlineSearch
                    hideTitle: true
                    color: default
                    variant: text
                    size: small
                - id: psl_proj_add_btn
                  type: Button
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: New Task
                    icon: AiOutlinePlus
                    color: primary
                    variant: solid
                    size: small
                  events:
                    onClick:
                      - id: psl_proj_add_action
                        type: DisplayMessage
                        params:
                          content: New task dialog would open here.
                          status: info
        siderOpen:
          blocks:
            - id: psl_proj_sider_progress
              type: Box
              style:
                padding: 12px
              blocks:
                - id: psl_proj_progress_label
                  type: Paragraph
                  properties:
                    content: Sprint Progress
                    style:
                      margin: 0 0 8px 0
                      fontSize: 12
                      color: '#ffffffa6'
                - id: psl_proj_progress
                  type: Progress
                  properties:
                    percent: 68
                    size: small
      blocks:
        - id: psl_proj_title
          type: Title
          properties:
            content: Project Alpha - Tasks
            level: 3
        - id: psl_proj_summary_row
          type: Box
          layout:
            gap: 16
          blocks:
            - id: psl_proj_stat_total
              type: Card
              layout:
                flex: 1 1 0
              properties:
                size: small
              blocks:
                - id: psl_proj_stat_total_val
                  type: Statistic
                  properties:
                    title: Total Tasks
                    value: 42
            - id: psl_proj_stat_done
              type: Card
              layout:
                flex: 1 1 0
              properties:
                size: small
              blocks:
                - id: psl_proj_stat_done_val
                  type: Statistic
                  properties:
                    title: Completed
                    value: 28
            - id: psl_proj_stat_open
              type: Card
              layout:
                flex: 1 1 0
              properties:
                size: small
              blocks:
                - id: psl_proj_stat_open_val
                  type: Statistic
                  properties:
                    title: In Progress
                    value: 14
        - id: psl_proj_tasks_card
          type: Card
          properties:
            title: Active Tasks
          blocks:
            - id: psl_proj_task_1
              type: Box
              layout:
                gap: 8
                align: center
              style:
                padding: 8px 0
                borderBottom: 1px solid var(--ant-color-border)
              blocks:
                - id: psl_proj_task_1_title
                  type: Paragraph
                  layout:
                    flex: 1 1 0
                  properties:
                    content: Implement user authentication flow
                    style:
                      margin: 0
                - id: psl_proj_task_1_tag
                  type: Tag
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: High
                    color: red
            - id: psl_proj_task_2
              type: Box
              layout:
                gap: 8
                align: center
              style:
                padding: 8px 0
                borderBottom: 1px solid var(--ant-color-border)
              blocks:
                - id: psl_proj_task_2_title
                  type: Paragraph
                  layout:
                    flex: 1 1 0
                  properties:
                    content: Design dashboard wireframes
                    style:
                      margin: 0
                - id: psl_proj_task_2_tag
                  type: Tag
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: Medium
                    color: orange
            - id: psl_proj_task_3
              type: Box
              layout:
                gap: 8
                align: center
              style:
                padding: 8px 0
              blocks:
                - id: psl_proj_task_3_title
                  type: Paragraph
                  layout:
                    flex: 1 1 0
                  properties:
                    content: Write API documentation
                    style:
                      margin: 0
                - id: psl_proj_task_3_tag
                  type: Tag
                  layout:
                    flex: 0 0 auto
                  properties:
                    title: Low
                    color: green
