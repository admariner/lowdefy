- title: Basic
  blocks:
    - id: basic_card_list
      type: CardList
      properties:
        data:
          - Alpha
          - Beta
          - Gamma
        html: |
          <h3>{{ index + 1 }}. {{ item }}</h3>

- title: Object Data
  blocks:
    - id: people_card_list
      type: CardList
      properties:
        hoverable: true
        bordered: false
        data:
          - name: Ada Lovelace
            email: ada@example.com
            role: Mathematician
          - name: Linus Torvalds
            email: linus@example.com
            role: Engineer
          - name: Grace Hopper
            email: grace@example.com
            role: Computer Scientist
        html: |
          <div style="display:flex; flex-direction:column; gap:4px;">
            <strong>{{ item.name }}</strong>
            <span style="color:#666;">{{ item.role }}</span>
            <a href="mailto:{{ item.email }}">{{ item.email }}</a>
          </div>

- title: With onClick
  blocks:
    - id: click_card_list
      type: CardList
      properties:
        hoverable: true
        data:
          - { id: 1, label: First }
          - { id: 2, label: Second }
          - { id: 3, label: Third }
        html: |
          <h4>{{ item.label }}</h4>
          <p>Click to see which row was selected.</p>
      events:
        onClick:
          - id: clicked_message
            type: Message
            params:
              content:
                _nunjucks:
                  template: 'Clicked row {{ index }} (id={{ item.id }})'
                  on:
                    _event: true

- title: Small Cards with Custom Gap
  blocks:
    - id: compact_card_list
      type: CardList
      properties:
        size: small
        gap: 4
        data:
          - One
          - Two
          - Three
          - Four
        html: |
          <span>{{ item }}</span>

- title: Large Dataset (Virtualized)
  blocks:
    - id: large_card_list
      type: CardList
      properties:
        hoverable: true
        height: 480
        data:
          _array.range:
            - 1
            - 1001
        html: |
          <h4>Row {{ item }}</h4>
          <p>This list renders one thousand cards. Only rows in (and near) the viewport are mounted in the DOM.</p>

- title: With Search (all fields)
  blocks:
    - id: search_all_card_list
      type: CardList
      properties:
        hoverable: true
        height: 360
        search: {}
        data:
          - { name: Ada Lovelace, email: ada@example.com, role: Mathematician }
          - { name: Linus Torvalds, email: linus@example.com, role: Engineer }
          - { name: Grace Hopper, email: grace@example.com, role: Computer Scientist }
          - { name: Alan Turing, email: alan@example.com, role: Mathematician }
          - { name: Margaret Hamilton, email: margaret@example.com, role: Software Engineer }
        html: |
          <strong>{{ item.name }}</strong>
          <div style="color:#666;">{{ item.role }} · <a href="mailto:{{ item.email }}">{{ item.email }}</a></div>

- title: With Search (specific fields)
  blocks:
    - id: search_fields_card_list
      type: CardList
      properties:
        hoverable: true
        height: 360
        search:
          placeholder: Filter by name…
          fields:
            - name
          minLength: 1
        data:
          - { name: Ada Lovelace, email: ada@example.com, role: Mathematician }
          - { name: Linus Torvalds, email: linus@example.com, role: Engineer }
          - { name: Grace Hopper, email: grace@example.com, role: Computer Scientist }
        html: |
          <strong>{{ item.name }}</strong>
          <div style="color:#666;">{{ item.role }}</div>
