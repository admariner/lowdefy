- title: Basic Masonry (3 Columns)
  fullWidth: true
  blocks:
    - id: ml_basic
      type: MasonryList
      properties:
        columns: 3
        gutter: 16
      blocks:
        - id: ml_basic_card
          type: Card
          class:
            _state: ml_basic_bg
          properties:
            size: small
          blocks:
            - id: ml_basic_title
              type: Title
              properties:
                content:
                  _state: ml_basic_title
                level: 5
            - id: ml_basic_desc
              type: Paragraph
              properties:
                content:
                  _state: ml_basic_desc

- title: Two Columns
  fullWidth: true
  blocks:
    - id: ml_two
      type: MasonryList
      properties:
        columns: 2
        gutter: 16
      blocks:
        - id: ml_two_card
          type: Card
          class:
            _state: ml_two_bg
          properties:
            size: small
          blocks:
            - id: ml_two_title
              type: Title
              properties:
                content:
                  _state: ml_two_title
                level: 5
            - id: ml_two_body
              type: Paragraph
              properties:
                content:
                  _state: ml_two_body

- title: Gutter Sizes
  fullWidth: true
  blocks:
    - id: ml_gutter_tight
      type: MasonryList
      properties:
        columns: 3
        gutter: 6
      blocks:
        - id: ml_gt_card
          type: Card
          class: bg-blue-50
          properties:
            size: small
          blocks:
            - id: ml_gt_label
              type: Paragraph
              properties:
                content:
                  _state: ml_gt_label
    - id: ml_gutter_wide
      type: MasonryList
      properties:
        columns: 3
        gutter: 24
      blocks:
        - id: ml_gw_card
          type: Card
          class: bg-blue-50
          properties:
            size: small
          blocks:
            - id: ml_gw_label
              type: Paragraph
              properties:
                content:
                  _state: ml_gw_label

- title: Note Board
  fullWidth: true
  blocks:
    - id: ml_notes
      type: MasonryList
      properties:
        columns: 3
        gutter: 12
      blocks:
        - id: ml_notes_card
          type: Card
          class:
            _state: ml_notes_bg
          properties:
            size: small
          blocks:
            - id: ml_notes_row
              type: Box
              layout:
                justify: space-between
                align: center
              blocks:
                - id: ml_notes_title
                  type: Title
                  layout:
                    flex: 1 1 0
                  properties:
                    content:
                      _state: ml_notes_title
                    level: 5
                - id: ml_notes_tag
                  type: Tag
                  layout:
                    flex: 0 0 auto
                  properties:
                    title:
                      _state: ml_notes_tag
                    color:
                      _state: ml_notes_color
            - id: ml_notes_body
              type: Paragraph
              properties:
                content:
                  _state: ml_notes_body

- title: Team Directory
  fullWidth: true
  blocks:
    - id: ml_team
      type: MasonryList
      properties:
        columns: 4
        gutter: 12
      blocks:
        - id: ml_team_card
          type: Card
          properties:
            size: small
          blocks:
            - id: ml_team_header
              type: Box
              layout:
                gap: 8
                align: center
              blocks:
                - id: ml_team_avatar
                  type: Avatar
                  layout:
                    flex: 0 0 auto
                  properties:
                    content:
                      _state: ml_team_initials
                    backgroundColor:
                      _state: ml_team_bg
                - id: ml_team_name
                  type: Title
                  layout:
                    flex: 1 1 0
                  properties:
                    content:
                      _state: ml_team_name
                    level: 5
            - id: ml_team_role
              type: Paragraph
              properties:
                content:
                  _state: ml_team_role

- title: Sequential Rendering
  fullWidth: true
  blocks:
    - id: ml_seq
      type: MasonryList
      properties:
        columns: 3
        gutter: 16
        sequential: true
      blocks:
        - id: ml_seq_card
          type: Card
          class:
            _state: ml_seq_bg
          properties:
            size: small
          blocks:
            - id: ml_seq_title
              type: Title
              properties:
                content:
                  _state: ml_seq_title
                level: 5
            - id: ml_seq_desc
              type: Paragraph
              properties:
                content:
                  _state: ml_seq_desc
