id: treeinput
type: Box

events:
  onInit:
    - id: set_defaults
      type: SetState
      params:
        ts_with_value: child1

blocks:
  - id: ts_basic
    type: TreeInput
    properties:
      primaryKey: id
      parentKey: parentId
      valueKey: id
      html: '{{ item.label }}'
      defaultExpandAll: true
      data:
        - { id: parent1, label: Parent 1 }
        - { id: child1, label: Child 1, parentId: parent1 }
        - { id: child2, label: Child 2, parentId: parent1 }
        - { id: parent2, label: Parent 2 }

  - id: ts_with_value
    type: TreeInput
    properties:
      primaryKey: id
      parentKey: parentId
      valueKey: id
      html: '{{ item.label }}'
      defaultExpandAll: true
      data:
        - { id: parent1, label: Parent 1 }
        - { id: child1, label: Child 1, parentId: parent1 }
        - { id: child2, label: Child 2, parentId: parent1 }

  - id: ts_disabled
    type: TreeInput
    properties:
      disabled: true
      primaryKey: id
      parentKey: parentId
      valueKey: id
      html: '{{ item.label }}'
      data:
        - { id: item1, label: Item 1 }
        - { id: item2, label: Item 2 }

  - id: ts_show_line
    type: TreeInput
    properties:
      showLine: true
      primaryKey: id
      parentKey: parentId
      valueKey: id
      html: '{{ item.label }}'
      defaultExpandAll: true
      data:
        - { id: parent, label: Parent }
        - { id: child1, label: Child 1, parentId: parent }
        - { id: child2, label: Child 2, parentId: parent }

  - id: ts_checkable
    type: TreeInput
    properties:
      checkable: true
      primaryKey: id
      parentKey: parentId
      valueKey: id
      html: '{{ item.label }}'
      data:
        - { id: item1, label: Item 1 }
        - { id: item2, label: Item 2 }
        - { id: item3, label: Item 3 }

  - id: ts_onchange
    type: TreeInput
    properties:
      primaryKey: id
      parentKey: parentId
      valueKey: id
      html: '{{ item.label }}'
      data:
        - { id: parent, label: Parent }
        - { id: apple, label: Apple, parentId: parent }
        - { id: banana, label: Banana, parentId: parent }
    events:
      onChange:
        - id: set_onchange
          type: SetState
          params:
            ts_onchange_value:
              _state: ts_onchange

  - id: ts_onchange_display
    type: Span
    properties:
      content:
        _if:
          test:
            _ne:
              - _state: ts_onchange_value
              - null
          then:
            _string.concat:
              - 'Selected: '
              - _json.stringify:
                  - _state: ts_onchange_value
          else: ''

  - id: ts_interaction
    type: TreeInput
    properties:
      primaryKey: id
      parentKey: parentId
      valueKey: id
      html: '{{ item.label }}'
      data:
        - { id: fruits, label: Fruits }
        - { id: apple, label: Apple, parentId: fruits }
        - { id: banana, label: Banana, parentId: fruits }
        - { id: vegetables, label: Vegetables }
        - { id: carrot, label: Carrot, parentId: vegetables }
