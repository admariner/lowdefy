- title: Basic (flat data)
  blocks:
    - id: basic_tree_selector
      type: TreeSelector
      properties:
        title: Category
        primaryKey: id
        parentKey: parentId
        valueKey: id
        html: '{{ item.label }}'
        treeDefaultExpandAll: true
        data:
          - { id: 1, label: Electronics }
          - { id: 2, label: Phones, parentId: 1 }
          - { id: 3, label: Laptops, parentId: 1 }
          - { id: 4, label: Clothing }
          - { id: 5, label: Shirts, parentId: 4 }
          - { id: 6, label: Shoes, parentId: 4 }

- title: Store a value field
  blocks:
    - id: value_tree_selector
      type: TreeSelector
      properties:
        title: Region
        placeholder: Pick a region...
        primaryKey: id
        parentKey: parentId
        valueKey: code
        html: '{{ item.label }}'
        treeDefaultExpandAll: true
        data:
          - { id: 1, label: Europe, code: eu }
          - { id: 2, label: Germany, code: de, parentId: 1 }
          - { id: 3, label: France, code: fr, parentId: 1 }
          - { id: 4, label: Americas, code: am }
          - { id: 5, label: United States, code: us, parentId: 4 }
      events:
        onChange:
          - id: capture
            type: SetState
            params:
              region:
                _event: value
    - id: value_tree_display
      type: Paragraph
      properties:
        content:
          _nunjucks:
            template: 'Selected code: {{ region if region != null else "—" }}'
            on:
              _state: true

- title: Options (label/value)
  blocks:
    - id: options_tree_selector
      type: TreeSelector
      properties:
        title: Department
        primaryKey: value
        parentKey: parent
        treeDefaultExpandAll: true
        options:
          - { value: eng, label: Engineering }
          - { value: fe, label: Frontend, parent: eng }
          - { value: be, label: Backend, parent: eng }
          - { value: ops, label: Operations }
