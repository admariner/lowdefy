- title: Profile change
  fullWidth: true
  blocks:
    - id: datadiff_profile
      type: DataDiff
      properties:
        title: Profile updated
        before:
          name: Sarah Johnson
          email: sarah@example.com
          role: member
          newsletterOptIn: true
          lastLoginAt: '2026-01-15T09:24:00Z'
          address:
            street: 221B Baker Street
            city: London
            country: UK
        after:
          name: Sarah Johnson
          email: sarah.johnson@example.com
          role: admin
          newsletterOptIn: false
          lastLoginAt: '2026-04-17T14:05:00Z'
          address:
            street: 221B Baker Street
            city: London
            country: United Kingdom
        labels:
          name: Full name
          email: Email address
          role: Role
          newsletterOptIn: Newsletter
          lastLoginAt: Last login
          address: Mailing address
          'address.street': Street
          'address.city': City
          'address.country': Country
        format:
          lastLoginAt:
            type: datetime
            pattern: MMM D, YYYY HH:mm
          newsletterOptIn:
            type: boolean
          role:
            type: enum
            map:
              member: { label: Member, color: default }
              admin: { label: Administrator, color: gold }

- title: Order update
  fullWidth: true
  blocks:
    - id: datadiff_order
      type: DataDiff
      properties:
        title: Order #A-10422
        before:
          status: pending
          subtotal: 129.5
          tax: 10.36
          total: 139.86
          items:
            - Notebook (A5)
            - Pen (blue)
          internal:
            createdBy: sys
            traceId: abc-123
        after:
          status: paid
          subtotal: 129.5
          tax: 10.36
          total: 139.86
          items:
            - Notebook (A5)
            - Pen (blue)
            - Sticky notes
          internal:
            createdBy: sys
            traceId: abc-999
        hide:
          - 'internal.*'
        labels:
          status: Status
          subtotal: Subtotal
          tax: Tax
          total: Total
          items: Line items
        format:
          subtotal: { type: currency, currency: USD }
          tax: { type: currency, currency: USD }
          total: { type: currency, currency: USD }
          status:
            type: enum
            map:
              pending: { label: Pending, color: warning }
              paid: { label: Paid, color: success }
              cancelled: { label: Cancelled, color: error }

- title: Inventory with unchanged
  fullWidth: true
  blocks:
    - id: datadiff_inventory
      type: DataDiff
      properties:
        title: Inventory snapshot
        showUnchanged: true
        before:
          sku: WID-001
          name: Widget A
          quantity: 120
          reorderPoint: 40
          active: true
        after:
          sku: WID-001
          name: Widget A
          quantity: 38
          reorderPoint: 40
          active: true
        labels:
          sku: SKU
          name: Product
          quantity: Quantity on hand
          reorderPoint: Reorder point
          active: Active
        format:
          active: { type: boolean }

- title: Empty state
  fullWidth: true
  blocks:
    - id: datadiff_empty
      type: DataDiff
      properties:
        title: Settings saved
        emptyText: No changes since last save.
        before:
          theme: dark
          language: en
        after:
          theme: dark
          language: en

- title: Orders array — per-item sub-grouping
  fullWidth: true
  blocks:
    - id: datadiff_orders_array
      type: DataDiff
      properties:
        title: Orders updated
        before:
          orders:
            - id: ord_1
              total: 10
              name: Notebook
            - id: ord_2
              total: 5
              name: Pen
        after:
          orders:
            - id: ord_1
              total: 20
              name: Notebook
            - id: ord_2
              total: 5
              name: Pen
            - id: ord_3
              total: 99
              name: Stapler
        labels:
          orders: Orders
          'orders.0.total': Total
        format:
          'orders.*.total': { type: currency, currency: USD }

- title: Side-by-side mode
  fullWidth: true
  blocks:
    - id: datadiff_side_by_side
      type: DataDiff
      properties:
        title: Profile updated
        mode: sideBySide
        before:
          name: Sarah Johnson
          email: sarah@example.com
          role: member
        after:
          name: Sarah M. Johnson
          email: sarah.j@example.com
          role: admin

- title: Timeline mode
  fullWidth: true
  blocks:
    - id: datadiff_timeline
      type: DataDiff
      properties:
        title: Order #A-10422
        mode: timeline
        before:
          status: pending
          subtotal: 129.5
          tax: 10.36
          total: 139.86
          items:
            - Notebook (A5)
            - Pen (blue)
          internal:
            createdBy: sys
            traceId: abc-123
        after:
          status: paid
          subtotal: 129.5
          tax: 10.36
          total: 139.86
          items:
            - Notebook (A5)
            - Pen (blue)
            - Sticky notes
          internal:
            createdBy: sys
            traceId: abc-999
        hide:
          - 'internal.*'
        labels:
          status: Status
          subtotal: Subtotal
          tax: Tax
          total: Total
          items: Line items
        format:
          subtotal: { type: currency, currency: USD }
          tax: { type: currency, currency: USD }
          total: { type: currency, currency: USD }
          status:
            type: enum
            map:
              pending: { label: Pending, color: warning }
              paid: { label: Paid, color: success }
              cancelled: { label: Cancelled, color: error }

- title: gitDiff mode — YAML patch
  fullWidth: true
  blocks:
    - id: datadiff_git_diff
      type: DataDiff
      properties:
        title: Order patch
        mode: gitDiff
        before:
          order:
            status: pending
            total: 10
            notes:
              - draft
        after:
          order:
            status: paid
            total: 15
            notes:
              - draft
              - sent
