id: data-diff
type: Box

blocks:
  # ============================================
  # EMPTY STATE
  # ============================================

  - id: datadiff_empty
    type: DataDiff
    properties:
      title: No changes
      emptyText: Nothing to show here.
      before:
        theme: dark
      after:
        theme: dark

  # ============================================
  # BASIC CHANGE RENDERING
  # ============================================

  - id: datadiff_basic
    type: DataDiff
    properties:
      title: Profile
      before:
        name: Sarah
        role: member
      after:
        name: Sarah
        role: admin

  # ============================================
  # LABELS
  # ============================================

  - id: datadiff_labels
    type: DataDiff
    properties:
      before:
        email: a@example.com
      after:
        email: b@example.com
      labels:
        email: Email address

  # ============================================
  # HIDE FILTER
  # ============================================

  - id: datadiff_hide
    type: DataDiff
    properties:
      before:
        email: a@example.com
        internal:
          traceId: x
      after:
        email: b@example.com
        internal:
          traceId: y
      hide:
        - 'internal.*'

  # ============================================
  # BOOLEAN FORMATTER
  # ============================================

  - id: datadiff_boolean
    type: DataDiff
    properties:
      before:
        active: false
      after:
        active: true
      format:
        active:
          type: boolean
          yes: Enabled
          no: Disabled

  # ============================================
  # ENUM FORMATTER
  # ============================================

  - id: datadiff_enum
    type: DataDiff
    properties:
      before:
        status: pending
      after:
        status: paid
      format:
        status:
          type: enum
          map:
            pending: { label: Pending, color: warning }
            paid: { label: Paid, color: success }

  # ============================================
  # ADDED AND REMOVED
  # ============================================

  - id: datadiff_add_remove
    type: DataDiff
    properties:
      before:
        name: Sarah
        phone: '555-1234'
      after:
        name: Sarah
        email: sarah@example.com

  # ============================================
  # GROUPED CHANGES (multiple root keys)
  # ============================================

  - id: datadiff_grouped
    type: DataDiff
    properties:
      before:
        profile:
          name: Sarah
        address:
          city: London
      after:
        profile:
          name: Sarah Johnson
        address:
          city: Paris

  # ============================================
  # SHOW UNCHANGED
  # ============================================

  - id: datadiff_unchanged
    type: DataDiff
    properties:
      showUnchanged: true
      before:
        name: Sarah
        role: member
      after:
        name: Sarah
        role: admin

  - id: datadiff_orders_array
    type: DataDiff
    properties:
      before:
        orders:
          - id: ord_1
            total: 10
            name: Notebook
          - id: ord_2
            total: 5
            name: Pen
      after:
        orders:
          - id: ord_1
            total: 20
            name: Notebook
          - id: ord_2
            total: 5
            name: Pen
          - id: ord_3
            total: 99
            name: Stapler

  - id: datadiff_deep_path
    type: DataDiff
    properties:
      before:
        settings:
          display:
            theme:
              mode: dark
      after:
        settings:
          display:
            theme:
              mode: light

  - id: datadiff_max_depth
    type: DataDiff
    properties:
      maxDepth: 3
      before:
        settings:
          display:
            theme:
              mode: dark
      after:
        settings:
          display:
            theme:
              mode: light

  - id: datadiff_side_by_side
    type: DataDiff
    properties:
      mode: sideBySide
      before:
        name: Sarah
        role: member
      after:
        name: Sarah Johnson
        role: admin

  - id: datadiff_timeline
    type: DataDiff
    properties:
      mode: timeline
      before:
        a: 1
        b: 2
        c: 3
      after:
        a: 10
        b: 2
        d: 4

  - id: datadiff_git_diff
    type: DataDiff
    properties:
      mode: gitDiff
      before:
        order:
          status: pending
          total: 10
      after:
        order:
          status: paid
          total: 15
