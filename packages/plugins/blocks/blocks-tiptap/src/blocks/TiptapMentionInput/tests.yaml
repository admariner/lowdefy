- id: default
  type: TiptapMentionInput
- id: properties.placeholder
  type: TiptapMentionInput
  properties:
    placeholder: 'Type @ to mention...'
- id: properties.disabled
  type: TiptapMentionInput
  properties:
    disabled: true
- id: properties.mentions.options
  type: TiptapMentionInput
  properties:
    mentions:
      options:
        - label: Alice
          value:
            _id: user_1
        - label: Bob
          value:
            _id: user_2
- id: properties.mentions.char = '#'
  type: TiptapMentionInput
  properties:
    placeholder: 'Type # to tag'
    mentions:
      char: '#'
      options:
        - label: bug
          value:
            _id: tag_bug
- id: properties.mentions.limit with sections
  type: TiptapMentionInput
  properties:
    mentions:
      limit: 2
      options:
        - label: Alice
          value:
            _id: user_1
          tag:
            section: People
        - label: Bob
          value:
            _id: user_2
          tag:
            section: People
        - label: Finance
          value:
            _id: role_finance
          tag:
            section: Roles
- id: properties.mentions.groupColors with group chips
  type: TiptapMentionInput
  properties:
    mentions:
      groupColors:
        devs: '#13c2c2'
      options:
        - label: Alice
          value:
            _id: user_1
          tag:
            section: People
        - label: Finance
          value:
            role: finance-admin
          tag:
            section: Roles
            group: finance
            color: '#722ed1'
        - label: Developers
          value:
            role: developer
          tag:
            section: Roles
            group: devs
