- title: Default with static mentions
  fullWidth: true
  blocks:
    - id: tiptap_mention_default
      type: TiptapMentionInput
      properties:
        title: Ticket note
        placeholder: 'Type @ to mention someone.'
        mentions:
          options:
            - label: Alice
              value:
                _id: user_1
                name: Alice
            - label: Bob
              value:
                _id: user_2
                name: Bob
            - label: Carol
              value:
                _id: user_3
                name: Carol

- title: Pre-populated content via SetState on onMount
  fullWidth: true
  blocks:
    - id: tiptap_mention_prepopulated
      type: TiptapMentionInput
      events:
        onMount:
          - id: tiptap_mention_prepopulated_set
            type: SetState
            params:
              tiptap_mention_prepopulated:
                html: >
                  <p>Thanks <span class="tiptap-mention">@Alice</span> for the review.
                  Assigning follow-up to <span class="tiptap-mention">@Bob</span>.</p>
      properties:
        title: Ticket summary
        mentions:
          options:
            - label: Alice
              value:
                _id: user_1
            - label: Bob
              value:
                _id: user_2

- title: Custom trigger character (hashtags)
  fullWidth: true
  blocks:
    - id: tiptap_mention_hashtags
      type: TiptapMentionInput
      properties:
        title: Tag the ticket
        placeholder: 'Type # to add a tag.'
        mentions:
          char: '#'
          allowSpaces: false
          options:
            - label: bug
              value:
                _id: tag_bug
            - label: feature
              value:
                _id: tag_feature
            - label: needs-triage
              value:
                _id: tag_triage

- title: Mentions rendered as links
  fullWidth: true
  blocks:
    - id: tiptap_mention_links
      type: TiptapMentionInput
      properties:
        title: Link mentions to profile pages
        placeholder: 'Type @ — selections render as <a>.'
        mentions:
          options:
            - label: Alice
              value:
                _id: user_1
            - label: Bob
              value:
                _id: user_2
          getHref:
            _function:
              __string.concat:
                - '/users/'
                - __args: 0.value._id

- title: autoSize — minRows 2, maxRows 5
  fullWidth: true
  blocks:
    - id: tiptap_mention_autosize
      type: TiptapMentionInput
      properties:
        title: Grows between 2 and 5 rows
        placeholder: 'Type @ to mention. Scrolls past 5 rows.'
        autoSize:
          minRows: 2
          maxRows: 5
        mentions:
          options:
            - label: Alice
              value:
                _id: user_1
            - label: Bob
              value:
                _id: user_2

- title: Validation — required, with error state
  fullWidth: true
  blocks:
    - id: tiptap_mention_validation
      type: TiptapMentionInput
      required: true
      properties:
        title: Mention a teammate (required)
        placeholder: 'Type @ and pick someone, then click Validate.'
        rows: 3
        mentions:
          options:
            - label: Alice
              value:
                _id: user_1
            - label: Bob
              value:
                _id: user_2
      validate:
        - status: error
          message: 'Please mention at least one teammate.'
          pass:
            _gt:
              - _string.length:
                  _state: tiptap_mention_validation.text
              - 0
    - id: tiptap_mention_validation_button
      type: Button
      properties:
        title: Validate
      events:
        onClick:
          - id: tiptap_mention_validation_run
            type: Validate
            params:
              - tiptap_mention_validation

- title: Disabled (read-only)
  fullWidth: true
  blocks:
    - id: tiptap_mention_disabled
      type: TiptapMentionInput
      events:
        onMount:
          - id: tiptap_mention_disabled_set
            type: SetState
            params:
              tiptap_mention_disabled:
                html: '<p>Mentions render inline: <span class="tiptap-mention">@Alice</span>.</p>'
      properties:
        title: Read only
        disabled: true

- title: Sectioned menu
  fullWidth: true
  blocks:
    - id: tiptap_mention_sectioned
      type: TiptapMentionInput
      properties:
        title: Mention people or roles
        placeholder: 'Type @ — options are grouped, each section capped at 3.'
        mentions:
          limit: 3
          options:
            - label: Alice
              value:
                _id: user_1
              tag:
                section: People
            - label: Bob
              value:
                _id: user_2
              tag:
                section: People
            - label: Carol
              value:
                _id: user_3
              tag:
                section: People
            - label: Dave
              value:
                _id: user_4
              tag:
                section: People
            - label: Finance
              value:
                _id: role_finance
              tag:
                section: Roles
            - label: Developers
              value:
                _id: role_devs
              tag:
                section: Roles

- title: Group mentions
  fullWidth: true
  blocks:
    - id: tiptap_mention_groups
      type: TiptapMentionInput
      properties:
        title: Mention people or groups
        placeholder: 'Type @ — groups render as coloured chips, people as links.'
        mentions:
          # devs colour comes from this central map; finance overrides via tag.color
          groupColors:
            devs: '#13c2c2'
          getHref:
            _function:
              # people carry value.contact_id and link to a profile;
              # groups have no contact_id → null href → chip renders as <span>
              __if:
                test:
                  __type:
                    type: string
                    on:
                      __args: 0.value.contact_id
                then:
                  __string.concat:
                    - '/contacts?_id='
                    - __args: 0.value.contact_id
                else: null
          options:
            - label: Alice
              value:
                contact_id: user_1
                name: Alice
              tag:
                section: People
            - label: Bob
              value:
                contact_id: user_2
                name: Bob
              tag:
                section: People
            - label: Finance
              value:
                role: finance-admin
              tag:
                section: Roles
                group: finance
                color: '#722ed1'
            - label: Developers
              value:
                role: developer
              tag:
                section: Roles
                group: devs

- title: Minimal — tables and images disabled
  fullWidth: true
  blocks:
    - id: tiptap_mention_minimal
      type: TiptapMentionInput
      properties:
        title: Chat-style
        placeholder: 'Type @ to mention.'
        image:
          disabled: true
        table:
          disabled: true
        highlight:
          disabled: true
        mentions:
          options:
            - label: Alice
              value:
                _id: user_1
            - label: Bob
              value:
                _id: user_2
