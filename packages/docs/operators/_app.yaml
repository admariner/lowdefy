_ref:
  path: templates/operators.yaml.njk
  transformer: templates/operatorsMethodTransformer.js
  vars:
    pageId: _app
    pageTitle: _app
    filePath: operators/_app.yaml
    env: Client and Server
    types: |
      ```
      (key: string): any
      (all: boolean): any
      (arguments: {
        all?: boolean,
        key?: string,
        default?: any,
      }): any
      ```
    description: |
      The `_app` operator reads structured app metadata declared in `lowdefy.yaml` together with build-environment facts captured by the build. It runs on both the client and the server.

      The metadata object has the following keys:

        - `slug`: From the root `slug` field. Optional, but if set must be kebab-case (`^[a-z][a-z0-9]*(-[a-z0-9]+)*$`) â€” lowercase letters and digits, hyphen-separated, starts with a letter, no leading/trailing/consecutive hyphens, no underscores. The build fails if the format does not match.
        - `name`: From the root `name` field. Free-form string.
        - `version`: From the root `version` field. Free-form string.
        - `description`: From the root `description` field. Free-form string.
        - `license`: From the root `license` field. Free-form string.
        - `lowdefyVersion`: From the root `lowdefy` field â€” the framework version the app targets.
        - `gitSha`: The build's git commit SHA. Resolved at build time in three steps: the `LOWDEFY_GIT_SHA` environment variable (when set non-empty) wins; otherwise the build runs `git rev-parse HEAD`; if both fail (no `.git`, no `git` binary, env unset), `gitSha` is `null`. The build does not error in any case.

      Missing root fields yield `null` â€” every key in the metadata is always present.

      Unknown keys return `null`. Dot-paths against the flat shape also return `null` (no exception).

      The `_app` operator is **runtime-only**. For build-time access to similar data, use [`_var`](/_var), [`_ref`](/_ref), or [`_build.env`](/_build).

      #### Pinning `gitSha` in deploy environments

      Several common deploy paths strip `.git` before the build runs â€” Docker images that `COPY` only built output, hermetic PaaS sandboxes (Vercel, Netlify, Render), and CI runners with `actions/checkout` configured to fetch only a shallow tree without `.git`. In those environments, `git rev-parse HEAD` fails and `_app: gitSha` resolves to `null` unless `LOWDEFY_GIT_SHA` is set. Map your platform's commit env var via shell expansion in the build command:

      | Platform        | Build command                                              |
      | --------------- | ---------------------------------------------------------- |
      | Vercel          | `LOWDEFY_GIT_SHA=$VERCEL_GIT_COMMIT_SHA lowdefy build`     |
      | Netlify         | `LOWDEFY_GIT_SHA=$COMMIT_REF lowdefy build`                |
      | Render          | `LOWDEFY_GIT_SHA=$RENDER_GIT_COMMIT lowdefy build`         |
      | GitHub Actions  | `LOWDEFY_GIT_SHA=$GITHUB_SHA lowdefy build`                |
      | Docker (CLI)    | `--build-arg LOWDEFY_GIT_SHA=$(git rev-parse HEAD)`        |

    arguments: |
      ###### string
      If the `_app` operator is called with a string argument, the value of the key in the app metadata is returned. If the key is not found, `null` is returned. Dot notation is supported.

      ###### boolean
      If the `_app` operator is called with the boolean argument `true`, the entire app metadata object is returned.

      ###### object
        - `all: boolean`: If `all` is set to `true`, the entire app metadata object is returned. One of `all` or `key` are required.
        - `key: string`: The value of the key in the app metadata is returned. If the value is not found, `null`, or the specified default value is returned. One of `all` or `key` are required.
        - `default: any`: A value to return if the `key` is not found. By default, `null` is returned if a value is not found.

    examples: |
      ###### Get the app slug:
      ```yaml
      _app: slug
      ```
      ```yaml
      _app:
        key: slug
      ```
      Returns: The value of `slug` declared in `lowdefy.yaml`.

      ###### Get the app name:
      ```yaml
      _app: name
      ```
      Returns: The value of the root `name` field.

      ###### Get the entire app metadata object:
      ```yaml
      _app: true
      ```
      ```yaml
      _app:
        all: true
      ```
      Returns: The full `{ slug, name, version, description, license, lowdefyVersion, gitSha }` object.

      ###### Return a default value if `gitSha` was not captured:
      ```yaml
      _app:
        key: gitSha
        default: dev
      ```
      Returns: The git SHA, or `"dev"` when unavailable (e.g. local dev with no `LOWDEFY_GIT_SHA` and no `.git`).

      ###### Scope a MongoDB request by app slug:
      ```yaml
      filter:
        created.app_name:
          _app: slug
      ```
      Returns: A filter document with `created.app_name` equal to the app's slug.

      ###### Show the version in a page title:
      ```yaml
      title:
        _string.concat:
          - { _app: name }
          - ' v'
          - { _app: version }
      ```
      Returns: e.g. `"My App v1.2.3"`.
