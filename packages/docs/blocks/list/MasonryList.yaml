              ml_team_role: Backend Engineer
              ml_team_bg: '#2f54eb'
          ml_seq:
            - ml_seq_title: Getting Started
              ml_seq_desc: A quick intro to the platform.
              ml_seq_bg: bg-blue-50
            - ml_seq_title: Authentication
              ml_seq_desc: Set up login providers, configure session handling, manage user roles and permissions, and integrate with external identity services like Auth0 and Okta.
              ml_seq_bg: bg-purple-50
            - ml_seq_title: API Reference
