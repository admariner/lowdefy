            - ml_seq_title: Deployment Guide
              ml_seq_desc: Step-by-step deployment to Docker, Vercel, and Node.js. Covers environment variables, build configuration, CI/CD pipelines, secrets management, and production monitoring setup.
              ml_seq_bg: bg-orange-50
            - ml_seq_title: Theming
