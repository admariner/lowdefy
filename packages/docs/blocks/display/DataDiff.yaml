_ref:
  path: templates/blocks/gallery.yaml.njk
  vars:
    pageId: DataDiff
    pageTitle: DataDiff
    section: Display Blocks
    filePath: blocks/display/DataDiff.yaml
    block_type: DataDiff
    github_path: packages/plugins/blocks/blocks-antd/src/blocks/DataDiff
    schema: ../plugins/blocks/blocks-antd/src/blocks/DataDiff/meta.js
    gallery: ../plugins/blocks/blocks-antd/src/blocks/DataDiff/gallery.yaml
    fullWidthExamples: true
    description: >
      `DataDiff` renders a polished, user-friendly diff between a `before` and
      an `after` object. Built on `microdiff` for the diff engine and antd
      primitives for rendering, it groups changes by top-level key, tags each
      row as Added / Removed / Changed, and supports per-path value formatters
      (`date`, `datetime`, `boolean`, `currency`, `enum`, `json`, `code`),
      humanised `labels`, and `hide` / `show` glob filtering. All colours come
      from antd's semantic tokens so dark mode and `theme` overrides work
      automatically.
